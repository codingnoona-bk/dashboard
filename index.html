<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>선주 지적 관리 시스템 · 코알누</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',Roboto,'Helvetica Neue',sans-serif;color:#1A1726;background:#F7F6FB;-webkit-font-smoothing:antialiased}
  input,select,textarea,button{font-family:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#DCD8E8;border-radius:6px;border:2px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:#C5BFD8;background-clip:content-box}
  @keyframes om-rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes om-sheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes om-fade{from{opacity:0}to{opacity:1}}
  @keyframes om-toast{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translateX(-50%)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{animation:spin .8s linear infinite}

  /* hover / active / focus interactions (ported from design pseudo-styles) */
  .btn-new:hover{background:#6B47E8 !important}
  .delayed-chip:hover{border-color:#DC2626 !important}
  .list-row:hover{background:#FAF9FD}
  .btn-touch:active{transform:scale(.98)}
  .foc:focus{border-color:#7C5CFC !important}
  .btn-reject:hover{background:#FEF2F2 !important}
  .btn-approve:hover{background:#138a3f !important}
  .btn-back:hover{color:#7C5CFC !important}
  #app{height:100%}
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, query, orderBy
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

// ───────────────────────────── firebase ─────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBKu88ixyGGy8x4ebS_aZ3aot-7-F1iq7c",
  authDomain: "dashboard-61e0a.firebaseapp.com",
  projectId: "dashboard-61e0a",
  storageBucket: "dashboard-61e0a.firebasestorage.app",
  messagingSenderId: "947807836894",
  appId: "1:947807836894:web:c93f560f80fccf7cee404f"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const itemsCol = collection(db, 'items');

  // ───────────────────────────── status meta ─────────────────────────────
  var META = {
    registered:{ label:'등록됨', fg:'#6B7280', bg:'#F3F4F6' },
    confirmed:{ label:'확인됨', fg:'#2563EB', bg:'#EFF6FF' },
    assigned:{ label:'배정됨', fg:'#6366F1', bg:'#EEF2FF' },
    progress:{ label:'진행중', fg:'#7C5CFC', bg:'#F3F0FF' },
    review:{ label:'검토대기', fg:'#D97706', bg:'#FFFBEB' },
    done:{ label:'완료', fg:'#16A34A', bg:'#F0FDF4' },
  };
  var ORDER = ['registered','confirmed','assigned','progress','review','done'];

  // ───────────────────────────── helpers ─────────────────────────────
  function esc(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }
  function prioStyle(p){
    var c = p === '높음' ? '#DC2626' : (p === '보통' ? '#D97706' : '#6B7280');
    var bg = p === '높음' ? '#FEECEC' : (p === '보통' ? '#FEF6E7' : '#F1F0F4');
    return 'font-size:10.5px;font-weight:800;color:' + c + ';background:' + bg + ';padding:2px 7px;border-radius:6px;flex:none';
  }
  function initial(name){ return name ? name.slice(-2) : '?'; }
  function today(){ return '2026.06.30 (화)'; }
  function now(){ return '06.30 ' + new Date().toTimeString().slice(0,5); }

  // ───────────────────────── firestore <-> view model ─────────────────────────
  // Normalize a Firestore document into the shape the UI expects.
  function normalize(id, data){
    data = data || {};
    return {
      id: id,
      code: data.code || id,
      title: data.title || '',
      ship: data.ship || '',
      zone: data.zone || '',
      source: data.source || '',
      priority: data.priority || '보통',
      status: data.status || 'registered',
      assignee: data.assignee || '',
      due: data.due || '미정',
      created: data.created || '',
      delayed: !!data.delayed,
      photos: typeof data.photos === 'number' ? data.photos : 0,
      workMemo: data.workMemo || '',
      history: Array.isArray(data.history) ? data.history : [],
      comments: Array.isArray(data.comments) ? data.comments : [],
      seq: typeof data.seq === 'number' ? data.seq : 0,
    };
  }
  // Next sequential punch-item code (P-26-NNN) based on what already exists.
  function nextCode(){
    var max = 0;
    state.items.forEach(function (it) {
      var m = /(\d+)\s*$/.exec(it.code || '');
      if (m) { var n = parseInt(m[1], 10); if (n > max) max = n; }
    });
    return 'P-26-' + String(max + 1).padStart(3, '0');
  }

  // ───────────────────────────── state ─────────────────────────────
  var state = {
    screen: 'dashboard',
    items: [],
    loading: true,
    loadError: '',
    selectedId: null,
    filters: { assignee:'전체', ship:'전체', zone:'전체', status:'전체' },
    workerName: '김현수',
    approveId: null,
    report: { open:false, id:null, memo:'', photo:false },
    reject: { open:false, id:null, reason:'', err:false },
    reg: { content:'', ship:'', zone:'', date:'', source:'', priority:'보통', attach:false, touched:false },
    assign: { worker:'', due:'' },
    commentDraft: '',
    toast: '',
  };
  var toastTimer = null;

  // ───────────────────────────── mutators ─────────────────────────────
  function go(s){ state.screen = s; render(); }
  function showToast(m){
    state.toast = m;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { state.toast = ''; render(); }, 2600);
    render();
  }

  // Write a partial update to a Firestore item, appending one history entry.
  // The onSnapshot listener reflects the change back into state.items.
  function patch(id, p, hist){
    var item = state.items.find(function (i) { return i.id === id; });
    var history = ((item && item.history) || []).concat([hist]);
    return updateDoc(doc(db, 'items', id), Object.assign({}, p, { history: history }));
  }

  async function submitReport(){
    var r = state.report;
    var item = state.items.find(function (i) { return i.id === r.id; });
    if (!item) return;
    var photos = (item.photos || 0) + (r.photo ? 1 : 0);
    var note = '완료 보고' + (r.photo ? ' · 사진 1장 첨부' : '') + (r.memo ? ' · "' + r.memo + '"' : '');
    state.report = Object.assign({}, state.report, { open:false });
    render();
    try {
      await patch(r.id, { status:'review', photos:photos, workMemo: r.memo || item.workMemo }, { t:now(), who:state.workerName, act:note });
      showToast('완료 보고 제출됨 — 승인 대기');
    } catch (e) { showToast('저장 실패 — 다시 시도하세요'); }
  }
  async function approveItem(id){
    if (!id) return;
    state.approveId = null;
    render();
    try {
      await patch(id, { status:'done' }, { t:now(), who:'서동현', act:'검토 후 승인 · 종결 처리' });
      showToast('승인 완료 — 종결 처리됨');
    } catch (e) { showToast('저장 실패 — 다시 시도하세요'); }
  }
  async function submitReject(){
    var rj = state.reject;
    if (!rj.reason.trim()) { state.reject = Object.assign({}, state.reject, { err:true }); render(); return; }
    var id = rj.id, reason = rj.reason;
    state.reject = Object.assign({}, state.reject, { open:false });
    state.approveId = null;
    render();
    try {
      await patch(id, { status:'progress' }, { t:now(), who:'서동현', act:'반려 · 사유: ' + reason, warn:true });
      showToast('반려 처리됨 — 진행중으로 회귀');
    } catch (e) { showToast('저장 실패 — 다시 시도하세요'); }
  }
  async function submitRegister(valid){
    if (!valid) { state.reg = Object.assign({}, state.reg, { touched:true }); showToast('필수 항목을 입력하세요'); return; }
    var r = state.reg;
    var code = nextCode();
    var dispDate = r.date ? r.date.slice(5).replace('-', '.') : '06.30';
    var item = {
      code: code, title: r.content.trim(), ship: r.ship, zone: r.zone.trim(),
      source: r.source, priority: r.priority, status: 'registered', assignee: '',
      due: '미정', created: dispDate, delayed: false, photos: r.attach ? 1 : 0, workMemo:'',
      history: [{ t:dispDate + ' ' + new Date().toTimeString().slice(0,5), who:'강민재', act:'지적 등록 · 출처 ' + r.source }],
      comments: [],
      seq: Date.now(),
    };
    state.reg = { content:'', ship:'', zone:'', date:'', source:'', priority:'보통', attach:false, touched:false };
    state.screen = 'dashboard';
    render();
    try {
      await setDoc(doc(db, 'items', code), item);
      showToast(code + ' 등록 완료');
    } catch (e) { showToast('등록 실패 — 다시 시도하세요'); }
  }
  async function assignSubmit(valid){
    if (!valid) { showToast('작업자와 기한을 선택하세요'); return; }
    var a = state.assign;
    var due = a.due ? a.due.slice(5).replace('-', '.') : '미정';
    var id = state.selectedId, worker = a.worker;
    state.assign = { worker:'', due:'' };
    render();
    try {
      await patch(id, { status:'assigned', assignee:worker, due:due }, { t:now(), who:'강민재', act:worker + ' 배정 · 기한 ' + due });
      showToast(worker + ' 작업자 배정됨');
    } catch (e) { showToast('저장 실패 — 다시 시도하세요'); }
  }
  async function addComment(){
    var text = state.commentDraft.trim();
    if (!text) return;
    var id = state.selectedId;
    var item = state.items.find(function (i) { return i.id === id; });
    if (!item) return;
    var comments = (item.comments || []).concat([{ who:'강민재', t:'06.30', text:text }]);
    state.commentDraft = '';
    render();
    try {
      await updateDoc(doc(db, 'items', id), { comments: comments });
    } catch (e) { showToast('저장 실패 — 다시 시도하세요'); }
  }

  // ───────────────────────────── view models ─────────────────────────────
  function vmItem(it){
    var m = META[it.status];
    var delayed = it.delayed && it.status !== 'done';
    return Object.assign({}, it, {
      sLabel: m.label,
      badgeStyle: 'display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800;color:' + m.fg + ';background:' + m.bg + ';white-space:nowrap',
      dotStyle: 'width:6px;height:6px;border-radius:9px;background:' + m.fg + ';flex:none',
      prioStyle: prioStyle(it.priority),
      delayed: delayed,
      assigneeLabel: it.assignee || '미배정',
      assigneeColor: it.assignee ? '#3A3648' : '#C5BFD8',
      dueColor: delayed ? '#DC2626' : '#6E6A7C',
    });
  }
  function cnt(k){ return state.items.filter(function (i) { return i.status === k; }).length; }
  function delayedCount(){ return state.items.filter(function (i) { return i.delayed && i.status !== 'done'; }).length; }
  function openCount(){ return state.items.length - cnt('done'); }

  // ───────────────────────────── sidebar ─────────────────────────────
  var ICONS = {
    dashboard:'<rect x="3" y="3" width="7" height="9" rx="1.5"></rect><rect x="14" y="3" width="7" height="5" rx="1.5"></rect><rect x="14" y="12" width="7" height="9" rx="1.5"></rect><rect x="3" y="16" width="7" height="5" rx="1.5"></rect>',
    worker:'<rect x="5" y="2" width="14" height="20" rx="2.5"></rect><line x1="10" y1="18" x2="14" y2="18"></line>',
    approve:'<path d="M5 12.5l4.5 4.5L19 6.5"></path>',
    register:'<line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>',
  };
  function navBtn(key, label, sub){
    var active = state.screen === key || (key === 'dashboard' && state.screen === 'detail');
    var style = 'display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:12px;cursor:pointer;font-size:14px;font-weight:700;border:none;width:100%;text-align:left;' + (active ? 'background:#F3F0FF;color:#7C5CFC' : 'background:transparent;color:#5A5668');
    var iconStyle = 'color:' + (active ? '#7C5CFC' : '#A99FD6');
    return '<button style="' + style + '" data-act="go" data-screen="' + key + '">' +
      '<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" style="' + iconStyle + '">' + ICONS[key] + '</svg>' +
      '<span style="flex:1">' + label + '</span>' +
      '<span style="font-size:10.5px;color:#B5B0C2;font-weight:600">' + sub + '</span>' +
    '</button>';
  }
  function sidebar(){
    return '' +
    '<aside style="width:248px;flex:none;background:#fff;border-right:1px solid #ECEAF3;display:flex;flex-direction:column;padding:22px 16px">' +
      '<div style="display:flex;align-items:center;gap:11px;padding:6px 8px 22px">' +
        '<div style="width:38px;height:38px;border-radius:11px;background:#7C5CFC;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,Menlo,monospace;font-weight:800;font-size:15px;color:#fff;letter-spacing:-1px">{;}</div>' +
        '<div>' +
          '<div style="font-size:15.5px;font-weight:800;letter-spacing:-.3px">코알누</div>' +
          '<div style="font-size:11.5px;color:#9A95A8;font-weight:600;margin-top:1px">선주 지적 관리</div>' +
        '</div>' +
      '</div>' +
      '<nav style="display:flex;flex-direction:column;gap:4px">' +
        navBtn('dashboard','현황 대시보드','담당자') +
        navBtn('worker','내 업무','작업자·태블릿') +
        navBtn('approve','승인','승인자') +
        navBtn('register','지적 등록','담당자') +
      '</nav>' +
      '<div style="margin-top:auto;padding:14px;background:#F7F6FB;border-radius:14px">' +
        '<div style="font-size:11px;color:#9A95A8;font-weight:700;margin-bottom:9px;letter-spacing:.2px">미완료 현황</div>' +
        '<div style="display:flex;align-items:flex-end;gap:8px">' +
          '<div style="font-size:30px;font-weight:800;line-height:.9;letter-spacing:-1px">' + openCount() + '</div>' +
          '<div style="font-size:12.5px;color:#6E6A7C;font-weight:600;padding-bottom:3px">건 처리 중</div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:6px;margin-top:10px">' +
          '<span style="width:7px;height:7px;border-radius:9px;background:#DC2626"></span>' +
          '<span style="font-size:12px;color:#DC2626;font-weight:700">지연 ' + delayedCount() + '건</span>' +
        '</div>' +
      '</div>' +
    '</aside>';
  }

  // ───────────────────────────── dashboard ─────────────────────────────
  var SELECT_STYLE = "appearance:none;background:#fff;border:1px solid #E2DEEE;border-radius:10px;padding:9px 32px 9px 13px;font-size:13px;font-weight:600;color:#3A3648;cursor:pointer;background-image:url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2210%22 height=%2210%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%239A95A8%22 stroke-width=%223%22><polyline points=%226 9 12 15 18 9%22/></svg>');background-repeat:no-repeat;background-position:right 11px center";

  function filterSelect(field, value, options){
    var opts = options.map(function (o) {
      return '<option value="' + esc(o) + '"' + (o === value ? ' selected' : '') + '>' + esc(o) + '</option>';
    }).join('');
    return '<select data-field="' + field + '" style="' + SELECT_STYLE + '">' + opts + '</select>';
  }

  function screenDashboard(){
    var items = state.items;
    var totalCount = items.length;
    var doneCount = cnt('done');
    var progressCount = cnt('progress');
    var reviewCount = cnt('review');
    var dCount = delayedCount();
    var oCount = openCount();
    var vmAll = items.map(vmItem);

    var cardBase = 'background:#fff;border:1px solid #ECEAF3;border-radius:16px;padding:17px 18px';
    function mkCard(label, value, sub, color, danger){
      return '<div style="' + (danger ? cardBase + ';border-color:#F8C9C9;background:#FFFBFB' : cardBase) + '">' +
        '<div style="font-size:13px;color:#6E6A7C;font-weight:700">' + label + '</div>' +
        '<div style="display:flex;align-items:flex-end;gap:7px;margin-top:10px">' +
          '<div style="font-size:30px;font-weight:800;line-height:.9;letter-spacing:-1px;color:' + color + '">' + value + '</div>' +
          '<div style="font-size:12px;color:#9A95A8;font-weight:700;padding-bottom:4px">' + (sub || '') + '</div>' +
        '</div>' +
      '</div>';
    }
    var cards =
      mkCard('전체 지적', totalCount, '미완료 ' + oCount, '#1A1726', false) +
      mkCard('진행중', progressCount, '', '#7C5CFC', false) +
      mkCard('검토대기', reviewCount, '', '#D97706', false) +
      mkCard('완료', doneCount, '', '#16A34A', false) +
      mkCard('지연', dCount, '', '#DC2626', true);

    var dist = ORDER.map(function (k) {
      var c = cnt(k); var m = META[k];
      var pct = totalCount ? (c / totalCount * 100) : 0;
      return { label:m.label, count:c, fg:m.fg, pct:pct };
    });
    var bars = dist.map(function (d) {
      return '<div style="flex:0 0 ' + d.pct + '%;background:' + d.fg + '" title="' + d.label + '"></div>';
    }).join('');
    var legend = dist.map(function (d) {
      return '<div style="display:flex;align-items:center;gap:7px">' +
        '<span style="width:9px;height:9px;border-radius:9px;background:' + d.fg + ';flex:none"></span>' +
        '<span style="font-size:12.5px;color:#5A5668;font-weight:600">' + d.label + '</span>' +
        '<span style="font-size:12.5px;color:#1A1726;font-weight:800">' + d.count + '</span>' +
      '</div>';
    }).join('');

    var delayedItems = vmAll.filter(function (v) { return v.delayed; });
    var delayedStrip = '';
    if (delayedItems.length > 0) {
      var chips = delayedItems.map(function (it) {
        return '<button data-act="open" data-id="' + esc(it.id) + '" class="delayed-chip" style="display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #F3B6B6;border-radius:11px;padding:9px 13px;cursor:pointer;text-align:left">' +
          '<span style="font-family:ui-monospace,monospace;font-size:11px;color:#DC2626;font-weight:700">' + esc(it.code) + '</span>' +
          '<span style="font-size:12.5px;font-weight:600;color:#1A1726;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(it.title) + '</span>' +
          '<span style="font-size:11.5px;color:#9A95A8;font-weight:600">' + esc(it.assigneeLabel) + '</span>' +
        '</button>';
      }).join('');
      delayedStrip =
      '<div style="background:#FEF2F2;border:1px solid #F8C9C9;border-radius:16px;padding:16px 20px;margin-bottom:18px">' +
        '<div style="display:flex;align-items:center;gap:9px;margin-bottom:12px">' +
          '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2.2"><path d="M12 9v4"></path><path d="M12 17h.01"></path><path d="M10.3 3.9 2.4 17.5A2 2 0 0 0 4.1 20.5h15.8a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"></path></svg>' +
          '<span style="font-size:14px;font-weight:800;color:#DC2626">지연 ' + dCount + '건 — 즉시 확인 필요</span>' +
        '</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:9px">' + chips + '</div>' +
      '</div>';
    }

    // filter options
    function uniq(arr){ return ['전체'].concat(Array.from(new Set(arr))); }
    var assigneeOptions = uniq(items.filter(function (i) { return i.assignee; }).map(function (i) { return i.assignee; }));
    var shipOptions = uniq(items.map(function (i) { return i.ship; }));
    var zoneOptions = uniq(items.map(function (i) { return i.zone; }));

    // status chips
    var chipDefs = [['전체','전체'],['registered','등록됨'],['confirmed','확인됨'],['assigned','배정됨'],['progress','진행중'],['review','검토대기'],['done','완료'],['지연','지연']];
    var statusChips = chipDefs.map(function (def) {
      var key = def[0], label = def[1];
      var active = state.filters.status === key;
      var fg = '#5A5668';
      if (META[key]) fg = META[key].fg;
      if (key === '지연') fg = '#DC2626';
      var style = active

            '<div style="background:#fff;padding:14px 16px"><div style="font-size:11.5px;color:#9A95A8;font-weight:700;margin-bottom:5px">호선 · 구역</div><div style="font-size:14px;font-weight:700">' + esc(v.ship) + ' · ' + esc(v.zone) + '</div></div>' +
            '<div style="background:#fff;padding:14px 16px"><div style="font-size:11.5px;color:#9A95A8;font-weight:700;margin-bottom:5px">출처 · 발생일</div><div style="font-size:14px;font-weight:700">' + esc(v.source) + ' · ' + esc(v.created) + '</div></div>' +
            '<div style="background:#fff;padding:14px 16px"><div style="font-size:11.5px;color:#9A95A8;font-weight:700;margin-bottom:5px">우선순위 · 기한</div><div style="font-size:14px;font-weight:700"><span style="' + v.prioStyle + '">' + esc(v.priority) + '</span> · ' + esc(v.due) + '</div></div>' +
          '</div>' +
          '<div style="font-size:14px;font-weight:800;margin-bottom:12px">첨부 자료</div>' +
          '<div style="display:flex;gap:12px;margin-bottom:26px;flex-wrap:wrap">' + photoList + '</div>' +
          '<div style="font-size:14px;font-weight:800;margin-bottom:12px">코멘트</div>' +
          '<div style="display:flex;flex-direction:column;gap:12px;margin-bottom:14px">' + comments + '</div>' +
          '<div style="display:flex;gap:10px">' +
            '<input data-field="commentDraft" value="' + esc(state.commentDraft) + '" placeholder="코멘트 입력..." class="foc" style="flex:1;border:1.5px solid #E2DEEE;border-radius:12px;padding:11px 14px;font-size:13.5px;outline:none" />' +
            '<button data-act="addComment" style="flex:none;padding:0 22px;background:#7C5CFC;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer">등록</button>' +
          '</div>' +
        '</div>' +
        '<div style="display:flex;flex-direction:column;gap:18px">' +
          '<div style="background:#fff;border:1px solid #ECEAF3;border-radius:16px;padding:20px">' +
            '<div style="font-size:13px;font-weight:800;color:#9A95A8;letter-spacing:.2px;margin-bottom:14px">진행 관리</div>' + action +
          '</div>' +
          '<div style="background:#fff;border:1px solid #ECEAF3;border-radius:16px;padding:20px">' +
            '<div style="font-size:13px;font-weight:800;color:#9A95A8;letter-spacing:.2px;margin-bottom:16px">상태 변경 이력</div>' +
            '<div style="display:flex;flex-direction:column">' + timelineHtml + '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }

    return '' +
    '<div data-screen-label="지적상세" style="height:100%;overflow-y:auto;padding:24px 36px 60px">' +
      '<button data-act="back" class="btn-back" style="display:flex;align-items:center;gap:7px;background:none;border:none;color:#6E6A7C;font-size:13.5px;font-weight:700;cursor:pointer;padding:6px 0;margin-bottom:14px">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="15 18 9 12 15 6"></polyline></svg>대시보드로</button>' +
      inner +
    '</div>';
  }

  // ───────────────────────────── compose ─────────────────────────────
  function loaderHtml(msg, isError){
    return '<div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">' +
      (isError ? '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2"><path d="M12 9v4"></path><path d="M12 17h.01"></path><circle cx="12" cy="12" r="9"></circle></svg>'
               : '<div class="spin" style="width:34px;height:34px;border-radius:50%;border:3px solid #ECEAF3;border-top-color:#7C5CFC"></div>') +
      '<div style="font-size:14px;font-weight:700;color:' + (isError ? '#DC2626' : '#9A95A8') + '">' + esc(msg) + '</div>' +
    '</div>';
  }
  function mainContent(){
    if (state.loadError) return loaderHtml('데이터 연결 오류 — ' + state.loadError, true);
    if (state.loading) return loaderHtml('데이터 불러오는 중…', false);
    switch (state.screen) {
      case 'dashboard': return screenDashboard();
      case 'detail': return screenDetail();
      case 'worker': return screenWorker();
      case 'approve': return screenApprove();
      case 'register': return screenRegister();
      default: return screenDashboard();
    }
  }
  function toastHtml(){
    if (!state.toast) return '';
    return '<div style="position:absolute;bottom:28px;left:50%;transform:translateX(-50%);background:#1A1726;color:#fff;font-size:14px;font-weight:700;padding:13px 24px;border-radius:999px;box-shadow:0 12px 30px rgba(20,16,40,.3);animation:om-toast .3s ease;display:flex;align-items:center;gap:9px;z-index:50">' +
      '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#7CF5B0" stroke-width="2.6"><path d="M5 12.5l4.5 4.5L19 6.5"></path></svg>' + esc(state.toast) +
    '</div>';
  }
  function renderApp(){
    return '<div style="display:flex;height:100vh;width:100vw;overflow:hidden">' +
      sidebar() +
      '<main style="flex:1;min-width:0;overflow:hidden;position:relative;display:flex;flex-direction:column">' +
        mainContent() +
        toastHtml() +
      '</main>' +
    '</div>';
  }

  var app = document.getElementById('app');
  var rendering = false, queued = false;
  function renderOnce(){
    var active = document.activeElement;
    var fieldKey = active && active.getAttribute ? active.getAttribute('data-field') : null;
    var selStart = null, selEnd = null;
    if (fieldKey && active && 'selectionStart' in active) {
      try { selStart = active.selectionStart; selEnd = active.selectionEnd; } catch (e) {}
    }
    app.innerHTML = renderApp();
    if (fieldKey) {
      var el = app.querySelector('[data-field="' + (window.CSS && CSS.escape ? CSS.escape(fieldKey) : fieldKey) + '"]');
      if (el) {
        el.focus();
        if (selStart != null && 'setSelectionRange' in el) {
          try { el.setSelectionRange(selStart, selEnd); } catch (e) {}
        }
      }
    }
  }
  // Reassigning innerHTML blurs the focused field, which can fire a change
  // event that re-enters render() mid-swap. Guard against reentrancy and
  // coalesce into a single follow-up render so no state update is lost.
  function render(){
    if (rendering) { queued = true; return; }
    rendering = true;
    try {
      renderOnce();
      while (queued) { queued = false; renderOnce(); }
    } finally {
      rendering = false;
    }
  }

  // ───────────────────────────── events ─────────────────────────────
  app.addEventListener('click', async function (e) {
    var target = e.target.closest('[data-act]');
    if (!target) return;
    var act = target.getAttribute('data-act');
    var id = target.getAttribute('data-id');
    switch (act) {
      case 'go': go(target.getAttribute('data-screen')); break;
      case 'open': state.screen = 'detail'; state.selectedId = id; render(); break;
      case 'statusFilter': state.filters = Object.assign({}, state.filters, { status: target.getAttribute('data-status') }); render(); break;
      case 'start':
        try {
          await patch(id, { status:'progress' }, { t:now(), who:state.workerName, act:'작업 착수' });
          showToast('착수 처리됨 — 진행중');
        } catch (e2) { showToast('저장 실패 — 다시 시도하세요'); }
        break;
      case 'report': state.report = { open:true, id:id, memo:'', photo:false }; render(); break;
      case 'togglePhoto': state.report = Object.assign({}, state.report, { photo: !state.report.photo }); render(); break;
      case 'closeSheet': state.report = Object.assign({}, state.report, { open:false }); render(); break;
      case 'submitReport': submitReport(); break;
      case 'selectApprove': state.approveId = id; render(); break;
      case 'approve': approveItem(state.approveId); break;
      case 'openReject': state.reject = { open:true, id:state.approveId, reason:'', err:false }; render(); break;
      case 'closeReject': state.reject = Object.assign({}, state.reject, { open:false }); render(); break;
      case 'submitReject': submitReject(); break;
      case 'regSource': state.reg = Object.assign({}, state.reg, { source: target.getAttribute('data-source') }); render(); break;
      case 'regPrio': state.reg = Object.assign({}, state.reg, { priority: target.getAttribute('data-prio') }); render(); break;
      case 'toggleAttach': state.reg = Object.assign({}, state.reg, { attach: !state.reg.attach }); render(); break;
      case 'submitRegister': {
        var r = state.reg;
        var valid = r.content.trim() && r.ship && r.zone.trim() && r.date && r.source;
        submitRegister(valid);
        break;
      }
      case 'back': go('dashboard'); break;
      case 'confirm':
        try {
          await patch(state.selectedId, { status:'confirmed' }, { t:now(), who:'강민재', act:'내용 확인 완료' });
          showToast('확인 처리됨');
        } catch (e2) { showToast('저장 실패 — 다시 시도하세요'); }
        break;
      case 'assignSubmit': assignSubmit(state.assign.worker && state.assign.due); break;
      case 'goApprove': go('approve'); break;
      case 'addComment': addComment(); break;
      case 'stop': break;
    }
  });

  function onField(e){
    var el = e.target;
    var field = el.getAttribute && el.getAttribute('data-field');
    if (!field) return;
    var val = el.value;
    switch (field) {
      case 'filterAssignee': state.filters = Object.assign({}, state.filters, { assignee: val }); render(); break;
      case 'filterShip': state.filters = Object.assign({}, state.filters, { ship: val }); render(); break;
      case 'filterZone': state.filters = Object.assign({}, state.filters, { zone: val }); render(); break;
      case 'reportMemo': state.report = Object.assign({}, state.report, { memo: val }); render(); break;
      case 'rejectReason': state.reject = Object.assign({}, state.reject, { reason: val, err: false }); render(); break;
      case 'regContent': state.reg = Object.assign({}, state.reg, { content: val }); render(); break;
      case 'regShip': state.reg = Object.assign({}, state.reg, { ship: val }); render(); break;
      case 'regZone': state.reg = Object.assign({}, state.reg, { zone: val }); render(); break;
      case 'regDate': state.reg = Object.assign({}, state.reg, { date: val }); render(); break;
      case 'assignWorker': state.assign = Object.assign({}, state.assign, { worker: val }); render(); break;
      case 'assignDue': state.assign = Object.assign({}, state.assign, { due: val }); render(); break;
      case 'commentDraft': state.commentDraft = val; render(); break;
    }
  }
  app.addEventListener('input', onField);
  app.addEventListener('change', onField);

  // ───────────────────────────── boot ─────────────────────────────
  render(); // initial paint (loading spinner) before first snapshot

  // Live subscription: Firestore is the single source of truth. Every write
  // (register/confirm/assign/start/report/approve/reject/comment) round-trips
  // through here, so all screens — and other devices — stay in sync.
  onSnapshot(
    query(itemsCol, orderBy('seq', 'desc')),
    function (snap) {
      var items = [];
      snap.forEach(function (d) { items.push(normalize(d.id, d.data())); });
      state.items = items;
      state.loading = false;
      state.loadError = '';
      render();
    },
    function (err) {
      state.loading = false;
      state.loadError = (err && err.message) ? err.message : String(err);
      render();
    }
  );
</script>
</body>
</html>
